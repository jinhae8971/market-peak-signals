name: Market Peak Signals Daily

on:
  schedule:
    - cron: "30 22 * * *"   # 매일 07:30 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run peak signals monitor
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TZ: "Asia/Seoul"
        run: python peak_signals.py

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/history.json
          git diff --cached --quiet || git commit -m "data: update $(date +'%Y-%m-%d')"
          git push

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'PYEOF'
          import os, requests
          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={"chat_id": os.environ["TELEGRAM_CHAT_ID"],
                    "text": "❌ Market Peak Signals 실행 실패! GitHub Actions 로그 확인"},
              timeout=10)
          PYEOF
